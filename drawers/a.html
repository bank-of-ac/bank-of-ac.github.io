<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drawer A - Bank of AC</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <main class="layout">
    <section class="note">
      <h1>Drawer A</h1>
      <p>The handle gives way with a dry scrape. Nothing inside but dust and a
      torn strip of ledger paper.</p>
      <p class="drawer-note">Teller note: drawer inspected after closing. No cash, seals, or keys remained.</p>
      <div class="drawer-scene" aria-label="Open empty drawer">
        <div class="glass shard-one"></div>
        <div class="glass shard-two"></div>
        <div class="glass shard-three"></div>
        <div class="drawer-box">
          <div class="drawer-face">
            <span class="handle"></span>
          </div>
          <div class="drawer-cavity">
            <span class="dust dust-one"></span>
            <span class="dust dust-two"></span>
            <span class="dust dust-three"></span>
            <span class="paper-strip">AC-VAULT-01</span>
          </div>
        </div>
      </div>
    </section>
    <a class="back" href="../index.html">Return to lobby</a>
  </main>
</body>
</html>
