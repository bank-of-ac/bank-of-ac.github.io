<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drawer B - Bank of AC</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <main class="layout">
    <section class="note">
      <h1>Drawer B</h1>
      <p>This drawer was forced open. The bottom is bare, scratched, and coated
      in gray dust.</p>
      <p class="drawer-note">Cleanup note: glass removed from the rails, dust left in place.</p>
      <div class="drawer-scene drawer-scene-b" aria-label="Forced empty drawer">
        <div class="glass shard-one"></div>
        <div class="glass shard-two"></div>
        <div class="glass shard-three"></div>
        <div class="drawer-box">
          <div class="drawer-face">
            <span class="handle"></span>
          </div>
          <div class="drawer-cavity">
            <span class="dust dust-one"></span>
            <span class="dust dust-two"></span>
            <span class="dust dust-three"></span>
            <span class="scratch scratch-one"></span>
            <span class="scratch scratch-two"></span>
          </div>
        </div>
      </div>
    </section>
    <a class="back" href="../index.html">Return to lobby</a>
  </main>
</body>
</html>
